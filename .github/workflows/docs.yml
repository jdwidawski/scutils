name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # required by peaceiris/actions-gh-pages

jobs:
  build-and-deploy:
    name: Build Sphinx docs and deploy to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install docs dependencies
        run: uv sync --frozen --extra docs

      - name: Build HTML
        run: uv run sphinx-build docs/ docs/_build/html -W --keep-going

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
          publish_branch: gh-pages
          force_orphan: true
